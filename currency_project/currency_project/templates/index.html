<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конвертер валют с выбором даты</title>
{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}?v=6">
</head>
<body>
{% csrf_token %}
<div class="container">
    <div class="header-top">
        <button class="header-btn" id="themeToggle">Смена темы</button>
        <button class="header-btn" id="registerBtn">Зарегистрироваться</button>
        <button class="header-btn" id="loginBtn">Войти</button>
        <button class="header-btn" id="profileBtn" style="display: none;">Профиль</button>
        <button class="header-btn" id="logoutBtn" style="display: none;">Выйти</button>
    </div>

    <div class="main-content">
        <div class="date-row">
            <div class="date-label">Выберите дату</div>
            <input type="date" class="date-picker" id="selectedDate">
        </div>

        <div class="currency-section">
            <div class="currency-card">
                <div class="currency-label"><span></span><span id="fromResult">0</span></div>
                <input  class="currency-input" id="amountFrom" value="100" min="0" step="0.01">
                <select class="currency-select" id="currencyFrom">
                    <option value="USD" selected>USD - Доллар США</option>
                    <option value="EUR">EUR - Евро</option>
                    <option value="GBP">GBP - Фунт</option>
                    <option value="RUB">RUB - Рубль</option>
                    <option value="SHAURMA">SHAURMA - Шаурма</option>
                    <option value="KIRIESHKI">KIRIESHKI - Пачка кириешек</option>
                    <option value="MARSIC">MARSIC - Корм для марсика</option>
                </select>
                <div class="quick-amounts">
                    <span class="quick-amount" data-amount="10">10</span>
                    <span class="quick-amount" data-amount="50">50</span>
                    <span class="quick-amount" data-amount="100">100</span>
                    <span class="quick-amount" data-amount="500">500</span>
                    <span class="quick-amount" data-amount="1000">1000</span>
                </div>
            </div>

            <button class="swap-button" id="swapCurrencies">⇄</button>

            <div class="currency-card">
                <div class="currency-label"><span></span><span id="toResult">0</span></div>
                <input type="number" class="currency-input" id="amountTo" readonly>
                <select class="currency-select" id="currencyTo">
                    <option value="USD">USD - Доллар США</option>
                    <option value="EUR">EUR - Евро</option>
                    <option value="GBP">GBP - Фунт</option>
                    <option value="RUB" selected>RUB - Рубль</option>
                    <option value="SHAURMA">SHAURMA - Шаурма</option>
                    <option value="KIRIESHKI">KIRIESHKI - Пачка кириешек</option>
                    <option value="MARSIC">MARSIC - Корм для марсика</option>
                </select>
            </div>
        </div>
        <div class="exchange-rate-info">

            <div class="exchange-rate" id="exchangeRate">—</div>
        </div>
        <div class="toggle-buttons">
            <button id="showTableBtn" class="toggle-btn active">Показать таблицу</button>
            <button id="showChartBtn" class="toggle-btn">Показать график</button>
        </div>

        <div class="table-container" id="ratesTableContainer">
            <table>
                <thead>
                    <tr>
                        <th>Валюта</th>
                        <th>Курс к RUB</th>
                        <th>Изменение</th>
                        <th>Дата</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>USD</td><td id="tableUsdRate">—</td><td id="tableUsdRate_d" >—</td><td class="date-cell">—</td></tr>
                    <tr><td>EUR</td><td id="tableEurRate">—</td><td id="tableEurRate_d" >—</td><td class="date-cell">—</td></tr>
                    <tr><td>GBP</td><td id="tableGbpRate">—</td><td id="tableGbpRate_d" >—</td><td class="date-cell">—</td></tr>
                    <tr><td>SHAURMA</td><td id="tableShaurmaRate">250.00</td><td id="tableShaurmaRate_d">0.00</td><td class="date-cell">всегда</td></tr>
                    <tr><td>KIRIESHKI</td><td id="tableKirieshkiRate">10.00</td><td id="tableKirieshkiRate_d">0.00</td><td class="date-cell">всегда</td></tr>
                    <tr><td>MARSIC</td><td id="tableMarsicRate">10000.00</td><td id="tableMarsicRate_d">0.00</td><td class="date-cell">всегда</td></tr>
                </tbody>
            </table>
        </div>

        <div id="chartContainer">
            <div class="chart-controls">
                <div>количество дней назад</div>
                <input  class="currency-select1" id="days" value="14" max="30" min="0" step="1">
                <label for="chartCurrency">Валюта 1:</label>
                <select id="chartCurrency1" class="currency-select" style="width:140px;">
                    <option value="USD" selected>USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="RUB">RUB</option>
                    <option value="SHAURMA">SHAURMA</option>
                    <option value="KIRIESHKI">KIRIESHKI</option>
                    <option value="MARSIC">MARSIC</option>
                </select>
                <label for="chartCurrency">Валюта 2:</label>
                <select id="chartCurrency2" class="currency-select" style="width:140px;">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="RUB" selected>RUB</option>
                    <option value="SHAURMA">SHAURMA</option>
                    <option value="KIRIESHKI">KIRIESHKI</option>
                    <option value="MARSIC">MARSIC</option>
                </select>
            </div>

            <canvas id="chartCanvas" width="760" height="240"></canvas>
        </div>
        <button class="forecast-btn" id="forecastBtn">Спрогнозировать курс</button>
    </div>
</div>

<!-- Модальное окно для регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Регистрация</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="registerUsername">Имя пользователя:</label>
                <input type="text" id="registerUsername" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Пароль:</label>
                <input type="password" id="registerPassword" required>
            </div>
            <div class="form-group">
                <label for="registerPassword2">Повторите пароль:</label>
                <input type="password" id="registerPassword2" required>
            </div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
        <div id="registerError" class="error-message"></div>
    </div>
</div>

<!-- Модальное окно для входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Вход</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUsername">Имя пользователя:</label>
                <input type="text" id="loginUsername" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Пароль:</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="submit-btn">Войти</button>
        </form>
        <div id="loginError" class="error-message"></div>
    </div>
</div>

<!-- Модальное окно для профиля -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Редактировать профиль</h2>
        <form id="profileForm">
            <div class="form-group">
                <label for="profileUsername">Имя пользователя:</label>
                <input type="text" id="profileUsername" readonly>
            </div>
            <div class="form-group">
                <label for="profileCurrency">Валюта по умолчанию:</label>
                <select id="profileCurrency">
                    <option value="USD">USD - Доллар США</option>
                    <option value="EUR">EUR - Евро</option>
                    <option value="GBP">GBP - Фунт</option>
                    <option value="RUB">RUB - Рубль</option>
                    <option value="SHAURMA">SHAURMA - Шаурма</option>
                    <option value="KIRIESHKI">KIRIESHKI - Пачка кириешек</option>
                    <option value="MARSIC">MARSIC - Корм для марсика</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Сохранить</button>
        </form>
        <div id="profileMessage" class="success-message"></div>
    </div>
</div>

<script src="{% static 'script.js' %}?v=6"></script>
<script src="{% static 'script.test.js' %}?v=6"></script>
</body>
</html>
